<nav class="sticky top-0 z-50 bg-slate-800 shadow-lg">
  <div class="mx-auto flex h-14 items-center px-6">

    <div class="mr-8 text-xl font-bold text-white">
      Bering Cleaners
    </div>

    <ul class="flex gap-2">
      @for (item of navItems; track item.path) {

      <li>
        <a
          [routerLink]="item.path"
          routerLinkActive="bg-sky-600 text-white"
          [routerLinkActiveOptions]="{
            exact: item.path === '/'
          }"
          class="rounded-md px-4 py-2 text-slate-200 transition-colors duration-200 hover:bg-slate-700 hover:text-white"
        >
          {{ item.label }}
        </a>
      </li>

      }
    </ul>

  </div>
</nav>
